name: Render Ace Magnates

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render-chunk:
    name: Render chunk ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - chunk: 1
            chunk_start: 0
          - chunk: 2
            chunk_start: 5
          - chunk: 3
            chunk_start: 10
          - chunk: 4
            chunk_start: 15
    env:
      PUBLIC_RENDER_MIRROR: https://github.com/acemagnates/ace-magnates-promo-public
      CHUNK_DURATION_SECONDS: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm render source
        run: |
          echo "Rendering from ${PUBLIC_RENDER_MIRROR}"
          echo "Rendering chunk ${{ matrix.chunk }} from ${{ matrix.chunk_start }}s for ${CHUNK_DURATION_SECONDS}s"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate static 300-frame source
        run: |
          node scripts/make-render-chunk.mjs ${{ matrix.chunk }} ${{ matrix.chunk_start }} ${CHUNK_DURATION_SECONDS}

      - name: Render 300-frame chunk
        run: |
          mkdir -p renders
          npx --yes hyperframes render . \
            --composition renders/chunk-sources/render-chunk-${{ matrix.chunk }}.html \
            --output renders/ace-magnates-chunk-${{ matrix.chunk }}.mp4 \
            --fps 60 \
            --quality draft \
            --resolution portrait \
            --workers 1 \
            --low-memory-mode \
            --strict

      - name: Upload rendered chunk
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-render-chunk-${{ matrix.chunk }}
          path: renders/ace-magnates-chunk-${{ matrix.chunk }}.mp4

  assemble:
    runs-on: ubuntu-latest
    needs: render-chunk
    permissions:
      contents: read
    steps:
      - name: Download render chunks
        uses: actions/download-artifact@v4
        with:
          path: renders/chunks
          pattern: ace-magnates-render-chunk-*
          merge-multiple: true

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Assemble chunked render
        run: |
          mkdir -p renders/assembled
          {
            for chunk in $(find renders/chunks -maxdepth 1 -name 'ace-magnates-chunk-*.mp4' | sort -V); do
              printf "file '%s'\n" "$chunk"
            done
          } > renders/chunks/concat.txt
          ffmpeg -y -f concat -safe 0 -i renders/chunks/concat.txt -c copy renders/assembled/ace-magnates-final.mp4

      - name: Upload assembled render
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-final-render
          path: renders/assembled/ace-magnates-final.mp4
