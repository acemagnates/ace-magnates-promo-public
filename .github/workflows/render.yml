name: Render Ace Magnates

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLIC_RENDER_MIRROR: https://github.com/acemagnates/ace-magnates-promo-public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm render source
        run: echo "Rendering from ${PUBLIC_RENDER_MIRROR}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Render full video
        run: |
          mkdir -p renders
          npx --yes hyperframes render . \
            --output renders/ace-magnates-full.mp4 \
            --fps 60 \
            --quality standard \
            --resolution portrait \
            --workers 1 \
            --low-memory-mode \
            --strict

      - name: Split into 300-frame chunks
        run: |
          mkdir -p renders/chunks
          ffmpeg -y -i renders/ace-magnates-full.mp4 -ss 0.000 -t 5.000 -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p -an renders/chunks/ace-magnates-chunk-1.mp4
          ffmpeg -y -i renders/ace-magnates-full.mp4 -ss 5.000 -t 5.000 -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p -an renders/chunks/ace-magnates-chunk-2.mp4
          ffmpeg -y -i renders/ace-magnates-full.mp4 -ss 10.000 -t 5.000 -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p -an renders/chunks/ace-magnates-chunk-3.mp4
          ffmpeg -y -i renders/ace-magnates-full.mp4 -ss 15.000 -t 5.000 -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p -an renders/chunks/ace-magnates-chunk-4.mp4

      - name: Upload render chunks
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-render-chunks
          path: renders/chunks/*.mp4

  assemble:
    runs-on: ubuntu-latest
    needs: render
    permissions:
      contents: read
    steps:
      - name: Download render chunks
        uses: actions/download-artifact@v4
        with:
          name: ace-magnates-render-chunks
          path: renders/chunks

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Assemble chunked render
        run: |
          mkdir -p renders/assembled
          {
            for chunk in renders/chunks/ace-magnates-chunk-*.mp4; do
              printf "file '%s'\n" "$chunk"
            done
          } > renders/chunks/concat.txt
          ffmpeg -y -f concat -safe 0 -i renders/chunks/concat.txt -c copy renders/assembled/ace-magnates-final.mp4

      - name: Upload assembled render
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-final-render
          path: renders/assembled/ace-magnates-final.mp4
